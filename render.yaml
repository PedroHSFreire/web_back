services:
  - type: web
    name: back
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: data
      mountPath: /opt/render/project/src/back/data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: SQLITE_PATH
        value: /opt/render/project/src/back/data/app.sqlite
